name: Build & Release APK

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Extract version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | sed 's/[^0-9]*//g')
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/MerlotTV-v${{ steps.version.outputs.name }}.apk

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: MerlotTV ${{ steps.version.outputs.tag }}
          body: |
            ## MerlotTV ${{ steps.version.outputs.tag }}

            **Version Code:** ${{ steps.version.outputs.code }}

            ### Changes
            - Auto-built from latest commit on main

            ### Install
            1. Download the APK below
            2. Install on your Android TV
            3. Future updates will be prompted automatically in-app
          files: |
            app/build/outputs/apk/debug/MerlotTV-v${{ steps.version.outputs.name }}.apk
          draft: false
          prerelease: false
          make_latest: true
